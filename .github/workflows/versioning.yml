name: RLM Auto Versioning

on:
  push:
    branches:
      - main
    paths-ignore:
      - '.github/workflows/**'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Calculate New Version
        id: versioning
        run: |
          MAJOR_TRIGGERS=("feat!:" "fix!:")
          MINOR_TRIGGERS=("feat:")
          
          CURRENT_VERSION=$(grep -m 1 'version =' pyproject.toml | cut -d '"' -f 2)
          BASE_VERSION=$(echo $CURRENT_VERSION | cut -d '-' -f 1)
          MAJOR=$(echo $BASE_VERSION | cut -d '.' -f 1)
          MINOR=$(echo $BASE_VERSION | cut -d '.' -f 2)
          PATCH=$(echo $BASE_VERSION | cut -d '.' -f 3)
          
          if [[ "$CURRENT_VERSION" == *"prerelease"* ]]; then
            PRE_NUM=$(echo $CURRENT_VERSION | cut -d '.' -f 4)
          else
            PRE_NUM=0
          fi

          COMMIT_MSG=$(git log -1 --pretty=%B)
          IS_MAJOR=false
          IS_MINOR=false

          for trigger in "${MAJOR_TRIGGERS[@]}"; do
            if [[ "$COMMIT_MSG" == "$trigger"* ]]; then IS_MAJOR=true; break; fi
          done

          if [ "$IS_MAJOR" = false ]; then
            for trigger in "${MINOR_TRIGGERS[@]}"; do
              if [[ "$COMMIT_MSG" == "$trigger"* ]]; then IS_MINOR=true; break; fi
            done
          fi

          if [ "$IS_MAJOR" = true ]; then
            NEW_MAJOR=$((MAJOR + 1))
            NEW_VERSION="${NEW_MAJOR}.0.0-prerelease.1"
          elif [ "$IS_MINOR" = true ]; then
            NEW_MINOR=$((MINOR + 1))
            NEW_VERSION="${MAJOR}.${NEW_MINOR}.0-prerelease.1"
          else
            NEW_PRE=$((PRE_NUM + 1))
            NEW_VERSION="${BASE_VERSION}-prerelease.${NEW_PRE}"
          fi

          echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "current_version=$CURRENT_VERSION" >> $GITHUB_OUTPUT
          echo "commit_msg=$COMMIT_MSG" >> $GITHUB_OUTPUT

      - name: Update pyproject.toml
        run: |
          sed -i "s/version = \"${{ steps.versioning.outputs.current_version }}\"/version = \"${{ steps.versioning.outputs.new_version }}\"/" pyproject.toml

      - name: Update CHANGELOG.md
        run: |
          DATE=$(date +%Y-%m-%d)
          if [ ! -f CHANGELOG.md ]; then
            echo -e "# CHANGELOG\n\n" > CHANGELOG.md
          fi
          echo -e "\n## v${{ steps.versioning.outputs.new_version }} ($DATE)\n\n- ${{ steps.versioning.outputs.commit_msg }}" > new_entry.tmp
          sed -i "//r new_entry.tmp" CHANGELOG.md
          rm new_entry.tmp

      - name: Commit and Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add pyproject.toml CHANGELOG.md
          git commit -m "chore(release): ${{ steps.versioning.outputs.new_version }} [skip ci]"
          git tag v${{ steps.versioning.outputs.new_version }}
          git push origin main --tags