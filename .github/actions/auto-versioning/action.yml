name: 'Auto Versioning'
description: 'Calculates next version, updates CHANGELOG and creates release'

inputs:
  github-token:
    description: 'GitHub token'
    required: true

runs:
  using: 'composite'
  steps:
    - name: Calculate New Version
      id: versioning
      shell: bash
      run: |
        MAJOR_TRIGGERS=("feat!:" "fix!:")
        MINOR_TRIGGERS=("feat:")

        CURRENT_VERSION=$(grep -m 1 'version =' pyproject.toml | cut -d '"' -f 2)

        BASE_VERSION=$(echo $CURRENT_VERSION | cut -d '-' -f 1)
        MAJOR=$(echo $BASE_VERSION | cut -d '.' -f 1)
        MINOR=$(echo $BASE_VERSION | cut -d '.' -f 2)

        if [[ "$CURRENT_VERSION" == *"prerelease"* ]]; then
          PRE_NUM=$(echo $CURRENT_VERSION | cut -d '.' -f 4)
        else
          PRE_NUM=0
        fi

        COMMIT_MSG=$(git log -1 --pretty=%B)
        IS_MAJOR=false
        IS_MINOR=false

        for trigger in "${MAJOR_TRIGGERS[@]}"; do
          if [[ "$COMMIT_MSG" == "$trigger"* ]]; then IS_MAJOR=true; break; fi
        done

        if [ "$IS_MAJOR" = false ]; then
          for trigger in "${MINOR_TRIGGERS[@]}"; do
            if [[ "$COMMIT_MSG" == "$trigger"* ]]; then IS_MINOR=true; break; fi
          done
        fi

        if [ "$IS_MAJOR" = true ]; then
          NEW_MAJOR=$((MAJOR + 1))
          NEW_VERSION="${NEW_MAJOR}.0.0-prerelease.1"
        elif [ "$IS_MINOR" = true ]; then
          NEW_MINOR=$((MINOR + 1))
          NEW_VERSION="${MAJOR}.${NEW_MINOR}.0-prerelease.1"
        else
          NEW_PRE=$((PRE_NUM + 1))
          NEW_VERSION="${BASE_VERSION}-prerelease.${NEW_PRE}"
        fi

        # Processa primeira linha
        FIRST_LINE=$(echo "$COMMIT_MSG" | head -1)
        if [[ "$FIRST_LINE" == *:* ]]; then
          CLEAN_FIRST_LINE=$(echo "$FIRST_LINE" | sed -E 's/^[^:]*:[[:space:]]*//' | sed 's/\b\(.\)/\u\1/g')
        else
          CLEAN_FIRST_LINE=$(echo "$FIRST_LINE" | sed 's/^\(.\)/\U\1/')
        fi

        # Restante do corpo
        REST=$(echo "$COMMIT_MSG" | tail -n +2 | sed '/^$/d' | sed 's/^\(.\)/\U\1/')

        if [ -n "$REST" ]; then
          RELEASE_BODY="- $CLEAN_FIRST_LINE"$'\n'"$REST"
          CHANGELOG_ENTRY="## v$NEW_VERSION ($(date +%Y-%m-%d))"$'\n'"- $CLEAN_FIRST_LINE"$'\n'"$REST"
        else
          RELEASE_BODY="- $CLEAN_FIRST_LINE"
          CHANGELOG_ENTRY="## v$NEW_VERSION ($(date +%Y-%m-%d))"$'\n'"- $CLEAN_FIRST_LINE"
        fi

        echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT
        echo "current_version=$CURRENT_VERSION" >> $GITHUB_OUTPUT
        echo "release_title=v$NEW_VERSION" >> $GITHUB_OUTPUT
        {
          echo "release_body<<EOF"
          echo "$RELEASE_BODY"
          echo "EOF"
        } >> $GITHUB_OUTPUT
        {
          echo "changelog_entry<<EOF"
          echo "$CHANGELOG_ENTRY"
          echo "EOF"
        } >> $GITHUB_OUTPUT

    - name: Update version file
      shell: bash
      run: |
        sed -i "s/version = \"${{ steps.versioning.outputs.current_version }}\"/version = \"${{ steps.versioning.outputs.new_version }}\"/" pyproject.toml

    - name: Update CHANGELOG.md
      shell: bash
      run: |
        if [ ! -f CHANGELOG.md ]; then
          echo -e "# CHANGELOG\n" > CHANGELOG.md
        fi

        # Insert new entry at the top, after the "# CHANGELOG" line
        echo -e "\n${{ steps.versioning.outputs.changelog_entry }}" > new_entry.tmp
        sed -i "/^# CHANGELOG/r new_entry.tmp" CHANGELOG.md
        rm new_entry.tmp

    - name: Commit and Push
      shell: bash
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add pyproject.toml CHANGELOG.md
        git commit -m "chore(release): ${{ steps.versioning.outputs.new_version }}" || echo "No changes to commit"
        git tag v${{ steps.versioning.outputs.new_version }}
        git push origin main --tags

    - name: Create GitHub Release
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github-token }}
      run: |
        gh release create v${{ steps.versioning.outputs.new_version }} \
          --title "${{ steps.versioning.outputs.release_title }}" \
          --notes "${{ steps.versioning.outputs.release_body }}" \
          --prerelease