name: 'Auto Versioning'
description: 'Calculates next version, updates CHANGELOG and creates release'

inputs:
  github-token:
    description: 'GitHub token'
    required: true

runs:
  using: 'composite'
  steps:
    - name: Read current version
      id: current
      shell: bash
      run: |
        CURRENT_VERSION=$(grep -m 1 'version =' pyproject.toml | cut -d '"' -f 2)
        BASE_VERSION=$(echo $CURRENT_VERSION | cut -d '-' -f 1)
        MAJOR=$(echo $BASE_VERSION | cut -d '.' -f 1)
        MINOR=$(echo $BASE_VERSION | cut -d '.' -f 2)
        
        echo "current_version=$CURRENT_VERSION" >> $GITHUB_OUTPUT
        echo "base_version=$BASE_VERSION" >> $GITHUB_OUTPUT
        echo "major=$MAJOR" >> $GITHUB_OUTPUT
        echo "minor=$MINOR" >> $GITHUB_OUTPUT

    - name: Read version stage
      id: stage
      shell: bash
      run: |
        if [ -f VERSION_STAGE.md ]; then
          STAGE=$(grep -v '^#' VERSION_STAGE.md | grep -v '^$' | head -1 | tr -d ' ')
        else
          STAGE=""
        fi
        echo "stage=$STAGE" >> $GITHUB_OUTPUT

    - name: Detect pre-release number
      id: prenum
      shell: bash
      run: |
        CURRENT_VERSION="${{ steps.current.outputs.current_version }}"
        STAGE="${{ steps.stage.outputs.stage }}"
        
        if [[ "$CURRENT_VERSION" == *"-dev."* ]]; then
          CURRENT_STAGE="dev"
          PRE_NUM=$(echo $CURRENT_VERSION | sed 's/.*-dev\.//')
        elif [[ "$CURRENT_VERSION" == *"-alpha."* ]]; then
          CURRENT_STAGE="alpha"
          PRE_NUM=$(echo $CURRENT_VERSION | sed 's/.*-alpha\.//')
        elif [[ "$CURRENT_VERSION" == *"-beta."* ]]; then
          CURRENT_STAGE="beta"
          PRE_NUM=$(echo $CURRENT_VERSION | sed 's/.*-beta\.//')
        elif [[ "$CURRENT_VERSION" == *"-rc."* ]]; then
          CURRENT_STAGE="rc"
          PRE_NUM=$(echo $CURRENT_VERSION | sed 's/.*-rc\.//')
        else
          CURRENT_STAGE=""
          PRE_NUM=0
        fi
        
        if [ "$STAGE" != "$CURRENT_STAGE" ]; then
          PRE_NUM=0
        fi
        
        echo "pre_num=$PRE_NUM" >> $GITHUB_OUTPUT

    - name: Get commit message
      id: commit
      shell: bash
      run: |
        COMMIT_MSG=$(git log --grep="^chore(release):" --invert-grep -1 --pretty=%B)
        {
          echo "message<<EOF"
          echo "$COMMIT_MSG"
          echo "EOF"
        } >> $GITHUB_OUTPUT

    - name: Calculate bump type
      id: bump
      shell: bash
      run: |
        MAJOR_TRIGGERS=("feat!:" "fix!:")
        MINOR_TRIGGERS=("feat:")
        COMMIT_MSG="${{ steps.commit.outputs.message }}"
        
        IS_MAJOR=false
        IS_MINOR=false

        for trigger in "${MAJOR_TRIGGERS[@]}"; do
          if [[ "$COMMIT_MSG" == "$trigger"* ]]; then IS_MAJOR=true; break; fi
        done

        if [ "$IS_MAJOR" = false ]; then
          for trigger in "${MINOR_TRIGGERS[@]}"; do
            if [[ "$COMMIT_MSG" == "$trigger"* ]]; then IS_MINOR=true; break; fi
          done
        fi

        echo "is_major=$IS_MAJOR" >> $GITHUB_OUTPUT
        echo "is_minor=$IS_MINOR" >> $GITHUB_OUTPUT

    - name: Build new version
      id: versioning
      shell: bash
      run: |
        MAJOR=${{ steps.current.outputs.major }}
        MINOR=${{ steps.current.outputs.minor }}
        BASE_VERSION=${{ steps.current.outputs.base_version }}
        PRE_NUM=${{ steps.prenum.outputs.pre_num }}
        STAGE="${{ steps.stage.outputs.stage }}"
        IS_MAJOR=${{ steps.bump.outputs.is_major }}
        IS_MINOR=${{ steps.bump.outputs.is_minor }}

        if [ "$IS_MAJOR" = true ]; then
          NEW_MAJOR=$((MAJOR + 1))
          BASE_VERSION="${NEW_MAJOR}.0.0"
          NEW_PRE=1
        elif [ "$IS_MINOR" = true ]; then
          NEW_MINOR=$((MINOR + 1))
          BASE_VERSION="${MAJOR}.${NEW_MINOR}.0"
          NEW_PRE=1
        else
          NEW_PRE=$((PRE_NUM + 1))
        fi

        if [ -n "$STAGE" ]; then
          NEW_VERSION="${BASE_VERSION}-${STAGE}.${NEW_PRE}"
        else
          NEW_VERSION="${BASE_VERSION}"
        fi

        echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT

    - name: Format release body
      id: release
      shell: bash
      run: |
        COMMIT_MSG="${{ steps.commit.outputs.message }}"
        NEW_VERSION="${{ steps.versioning.outputs.new_version }}"
        
        FIRST_LINE=$(echo "$COMMIT_MSG" | head -1)
        if [[ "$FIRST_LINE" == *:* ]]; then
          CLEAN_FIRST_LINE=$(echo "$FIRST_LINE" | sed -E 's/^[^:]*:[[:space:]]*//' | sed 's/\b\(.\)/\u\1/g')
        else
          CLEAN_FIRST_LINE=$(echo "$FIRST_LINE" | sed 's/^\(.\)/\U\1/')
        fi

        REST=$(echo "$COMMIT_MSG" | tail -n +2 | sed '/^$/d' | sed 's/^\(.\)/\U\1/')

        if [ -n "$REST" ]; then
          RELEASE_BODY="- $CLEAN_FIRST_LINE"$'\n'"$REST"
          CHANGELOG_ENTRY="## v$NEW_VERSION ($(date +%Y-%m-%d))"$'\n'"- $CLEAN_FIRST_LINE"$'\n'"$REST"
        else
          RELEASE_BODY="- $CLEAN_FIRST_LINE"
          CHANGELOG_ENTRY="## v$NEW_VERSION ($(date +%Y-%m-%d))"$'\n'"- $CLEAN_FIRST_LINE"
        fi

        echo "release_title=v$NEW_VERSION" >> $GITHUB_OUTPUT
        {
          echo "release_body<<EOF"
          echo "$RELEASE_BODY"
          echo "EOF"
        } >> $GITHUB_OUTPUT
        {
          echo "changelog_entry<<EOF"
          echo "$CHANGELOG_ENTRY"
          echo "EOF"
        } >> $GITHUB_OUTPUT

    - name: Update version file
      shell: bash
      run: |
        sed -i "s/version = \"${{ steps.current.outputs.current_version }}\"/version = \"${{ steps.versioning.outputs.new_version }}\"/" pyproject.toml

    - name: Update CHANGELOG.md
      shell: bash
      run: |
        if [ ! -f CHANGELOG.md ]; then
          echo -e "# CHANGELOG\n" > CHANGELOG.md
        fi

        echo -e "\n${{ steps.release.outputs.changelog_entry }}" > new_entry.tmp
        sed -i "/^# CHANGELOG/r new_entry.tmp" CHANGELOG.md
        rm new_entry.tmp

    - name: Commit and Push
      shell: bash
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add pyproject.toml CHANGELOG.md
        git commit -m "chore(release): ${{ steps.versioning.outputs.new_version }}" || echo "No changes to commit"
        git tag v${{ steps.versioning.outputs.new_version }}
        git push origin main --tags

    - name: Create GitHub Release
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github-token }}
      run: |
        STAGE="${{ steps.stage.outputs.stage }}"
        
        if [ -n "$STAGE" ]; then
          gh release create v${{ steps.versioning.outputs.new_version }} \
            --title "${{ steps.release.outputs.release_title }}" \
            --notes "${{ steps.release.outputs.release_body }}" \
            --prerelease
        else
          gh release create v${{ steps.versioning.outputs.new_version }} \
            --title "${{ steps.release.outputs.release_title }}" \
            --notes "${{ steps.release.outputs.release_body }}"
        fi